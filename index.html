<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VITALAB AUDIO · VLA-73 Mastering Analyzer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c0c0d;
      --cream: #ecdfbf;
      --amber: #ffae47;
      --red: #b23b30;
      --muted: #8b8478;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg) radial-gradient(ellipse at 50% -10%, #1c1c1f 0%, #0c0c0d 60%);
      color: var(--cream);
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

    main {
      width: min(520px, 100%);
      padding: 28px 22px;
      border: 1px solid #000;
      border-radius: 10px;
      background: linear-gradient(180deg, #2a2a2e, #161618);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      color: var(--amber);
      font-size: 1rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    a {
      display: inline-block;
      padding: 10px 16px;
      border: 1px solid #000;
      border-radius: 5px;
      background: linear-gradient(180deg, var(--red), #7d2820);
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <h1>VLA-73 Mastering Analyzer</h1>
    <p>Analizador local de masterización de Vitalab Audio.</p>
    <a href="vitalab-audio-mastering.html">Abrir VLA-73</a>
  </main>
</body>
</html>
